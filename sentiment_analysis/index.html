<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 dark:from-slate-900 dark:via-blue-950 dark:to-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="absolute top-4 right-4 flex items-center gap-3">
        <button id="lang-toggle" class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition">
            <i class="fas fa-globe"></i> <span id="lang-label">EN</span>
        </button>
        <button id="theme-toggle" class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 p-2 rounded-xl text-xs shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
    </div>

    <div class="bg-white dark:bg-slate-900/90 border border-slate-200 dark:border-blue-900/40 backdrop-blur-md rounded-2xl shadow-xl dark:shadow-2xl p-6 md:p-8 max-w-xl w-full text-center transition-colors duration-300">
        <div class="mb-6">
            <div class="w-12 h-12 rounded-xl bg-blue-500/10 text-blue-600 dark:text-blue-400 flex items-center justify-center text-2xl mx-auto mb-4 border border-blue-500/20">
                <i class="fas fa-brain"></i>
            </div>
            <h1 id="main-title" class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Analisis Sentimen AI</h1>
            <p id="main-desc" class="text-sm text-slate-500 dark:text-slate-400 max-w-sm mx-auto">
                Analisis sentimen teks Bahasa Indonesia berbasis Cloud menggunakan Gemini API & Netlify Functions
            </p>
        </div>

        <div id="status-container" class="mb-6 p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-600 dark:text-amber-400 text-sm flex flex-col sm:flex-row items-center justify-center gap-3">
            <div class="flex items-center gap-2">
                <i class="fas fa-spinner fa-spin" id="status-icon"></i>
                <span id="status-text">Mengunduh model NLP Bahasa Indonesia (mohon tunggu)...</span>
            </div>
            <button id="retry-btn" class="hidden bg-amber-600 hover:bg-amber-500 text-white text-xs font-semibold px-3 py-1 rounded-md transition shadow-sm">
                <i class="fas fa-redo"></i> Retry
            </button>
        </div>

        <div class="space-y-4 text-left">
            <label id="input-label" class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Masukkan Kalimat / Ulasan:</label>
            <textarea id="text-input" disabled rows="4" 
                class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-800 rounded-xl p-4 text-slate-900 dark:text-white text-sm focus:outline-none focus:border-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 placeholder:text-slate-400"
                placeholder="Contoh: Aplikasi ini sangat membantu pengerjaan tugas saya menjadi lebih cepat!"></textarea>
            
            <button id="analyze-btn" disabled
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition duration-300 transform hover:scale-[1.01] active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <i class="fas fa-chart-bar"></i> <span id="btn-text">Analisis Sentimen</span>
            </button>
        </div>

        
        <div class="mt-8 pt-4 border-t border-gray-200 dark:border-slate-800 text-center">
            <a href="../index.html" class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-800 transition duration-200 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Kembali ke Halaman Utama
            </a>
        </div>

        <div id="result-container" class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800/60 hidden text-left space-y-4">
            <h3 id="result-title" class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Hasil Analisis Model:</h3>
            
            <div class="flex items-center justify-between p-4 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800">
                <span id="label-tag" class="text-slate-500 dark:text-slate-400 text-sm">Label Sentimen:</span>
                <span id="sentiment-badge" class="px-3 py-1 rounded-md text-xs font-bold tracking-wide uppercase">POSITIF</span>
            </div>

            <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 space-y-2">
                <div class="flex justify-between text-sm">
                    <span id="confidence-tag" class="text-slate-500 dark:text-slate-400">Tingkat Keyakinan (Confidence Score):</span>
                    <span id="score-text" class="text-slate-900 dark:text-white font-mono font-bold">0%</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="score-bar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>
    </div>


    <script type="module">
    // GANTI KODE FETCH LAMA ANDA DENGAN JALUR NETLIFY INI:
    const response = await fetch(`/.netlify/functions/analyze-sentiment`, {
        method: "POST",
        headers: { 
            "Content-Type": "application/json" 
        },
        body: JSON.stringify({ text: text }) // Mengirim teks ke serverless Netlify
    });

    // DOM Elements Sesuai dengan Struktur ID HTML Asli Anda
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const langToggle = document.getElementById('lang-toggle');
    const langLabel = document.getElementById('lang-label');
    
    const mainTitle = document.getElementById('main-title');
    const mainDesc = document.getElementById('main-desc');
    const inputLabel = document.getElementById('input-label');
    const textInput = document.getElementById('text-input') || document.getElementById('textInput');
    const analyzeBtn = document.getElementById('analyze-btn') || document.getElementById('analyzeBtn');
    const btnText = document.getElementById('btn-text') || document.getElementById('btnText');
    
    const statusContainer = document.getElementById('status-container') || document.getElementById('statusContainer');
    const statusIcon = document.getElementById('status-icon') || document.getElementById('statusIcon');
    const statusText = document.getElementById('status-text') || document.getElementById('statusText');
    const retryBtn = document.getElementById('retry-btn') || document.getElementById('retryBtn');
    
    const resultContainer = document.getElementById('result-container') || document.getElementById('resultContainer');
    const sentimentBadge = document.getElementById('sentiment-badge') || document.getElementById('sentimentBadge');
    const scoreText = document.getElementById('score-text') || document.getElementById('scoreText');
    const scoreBar = document.getElementById('score-bar') || document.getElementById('scoreBar');

    let currentLang = 'id';

    const i18n = {
        id: {
            loading: "Menghubungkan ke Google AI Cloud...",
            ready: "Sistem AI Google Gemini siap digunakan!",
            error: "Kunci API tidak valid atau konfigurasi salah.",
            btn: "Analisis Sentimen",
            btnLoading: "Menganalisis..."
        },
        en: {
            loading: "Connecting to Google AI Cloud...",
            ready: "Google Gemini AI System is ready!",
            error: "Invalid API key or configuration failure.",
            btn: "Analyze Sentiment",
            btnLoading: "Analyzing..."
        }
    };

    // Inisialisasi awal - Langsung aktif tanpa beban unduhan biner
    function initAI() {
        if (retryBtn) retryBtn.classList.add('hidden');
        
        if (!GEMINI_API_KEY || GEMINI_API_KEY.startsWith("PASTE")) {
            if (statusIcon) statusIcon.className = 'fas fa-exclamation-triangle';
            if (statusContainer) statusContainer.className = "mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-600 dark:text-rose-400 text-sm flex items-center justify-center gap-3";
            if (statusText) statusText.textContent = i18n[currentLang].error;
            return;
        }

        // Tampilkan indikator sukses terhubung ke cloud
        if (statusContainer) statusContainer.className = "mb-6 p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl text-blue-600 dark:text-blue-400 text-sm flex items-center justify-center gap-3";
        if (statusIcon) statusIcon.className = 'fas fa-check-circle';
        if (statusText) statusText.textContent = i18n[currentLang].ready;
        
        if (textInput) textInput.disabled = false;
        if (analyzeBtn) analyzeBtn.disabled = false;
        if (btnText) btnText.textContent = i18n[currentLang].btn;
    }

    // Eksekusi Analisis Sentimen via Gemini 2.5 Flash
    if (analyzeBtn) {
        analyzeBtn.addEventListener('click', async () => {
            if (!textInput) return;
            const text = textInput.value.trim();
            if (!text) return;

            analyzeBtn.disabled = true;
            if (btnText) btnText.textContent = i18n[currentLang].btnLoading;

            // Prompt instruksi ketat agar Gemini mengembalikan format JSON murni
            const systemPrompt = "Anda adalah sistem pakar analisis sentimen teks Bahasa Indonesia. Analisis teks yang diberikan oleh pengguna dan berikan respons HANYA DALAM FORMAT JSON murni tanpa markdown, tanpa backticks, dan tanpa teks tambahan lain. Format JSON harus tepat seperti ini: {\"sentiment\": \"POSITIF\" atau \"NEGATIF\", \"confidence\": angka desimal antara 0 sampai 1}";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt },
                                { text: `Teks pengguna: "${text}"` }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                // Ambil text output dari response body Gemini
                let rawResponseText = data.candidates[0].content.parts[0].text.trim();
                
                // Antisipasi jika Gemini tidak sengaja menyertakan bungkus markdown ```json ```
                rawResponseText = rawResponseText.replace(/```json/g, "").replace(/```/g, "").trim();
                
                // Parsing teks menjadi objek JSON global
                const prediction = JSON.parse(rawResponseText);
                const displayLabel = prediction.sentiment.toUpperCase(); 
                const confidenceScore = prediction.confidence;

                // Tampilkan badge visual sentimen
                if (sentimentBadge) {
                    sentimentBadge.textContent = displayLabel === "POSITIF" ? (currentLang === 'id' ? "POSITIF" : "POSITIVE") : (currentLang === 'id' ? "NEGATIF" : "NEGATIVE");
                    if (displayLabel === "POSITIF") {
                        sentimentBadge.className = 'px-3 py-1 rounded-md text-xs font-bold tracking-wide uppercase bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20';
                        if (scoreBar) scoreBar.className = 'bg-blue-600 dark:bg-blue-500 h-full transition-all duration-500';
                    } else {
                        sentimentBadge.className = 'px-3 py-1 rounded-md text-xs font-bold tracking-wide uppercase bg-rose-500/10 text-rose-600 dark:text-rose-400 border border-rose-500/20';
                        if (scoreBar) scoreBar.className = 'bg-rose-600 dark:bg-rose-500 h-full transition-all duration-500';
                    }
                }

                // Kalkulasi persentase akurasi bar
                const scorePercentage = (confidenceScore * 100).toFixed(1);
                if (resultContainer) resultContainer.classList.remove('hidden');
                if (scoreText) scoreText.textContent = `${scorePercentage}%`;
                if (scoreBar) scoreBar.style.width = `${scorePercentage}%`;

            } catch (error) {
                alert('Gagal mendapatkan respons analisis dari Google AI Studio.');
                console.error("Detail Log Kendala API:", error);
            } finally {
                analyzeBtn.disabled = false;
                if (btnText) btnText.textContent = i18n[currentLang].btn;
            }
        });
    }

    // Toggle Kontrol Bahasa & Tema Utama
    if (langToggle) {
        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'id' ? 'en' : 'id';
            if (langLabel) langLabel.textContent = currentLang === 'id' ? 'EN' : 'ID';
            initAI();
        });
    }

    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (themeIcon) {
                themeIcon.className = document.documentElement.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
            }
        });
    }

    // Jalankan inisialisasi aplikasi
    initAI();
</script>
</body>
</html>
